name: Build Android APKs

on:
  push:
    branches: [ main ] # Change to master if your branch is named master
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle
      run: chmod +x ./gradlew

    - name: Build Passenger APK
      run: ./gradlew assemblePassengerDebug

    - name: Build Driver APK
      run: ./gradlew assembleDriverDebug

    - name: Upload Passenger APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: passenger-debug-apk
        path: app/build/outputs/apk/passenger/debug/app-passenger-debug.apk

    - name: Upload Driver APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: driver-debug-apk
        path: app/build/outputs/apk/driver/debug/app-driver-debug.apk
        
