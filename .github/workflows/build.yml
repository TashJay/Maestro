name: Build Android APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Grant Execute Permission for Gradle
      run: chmod +x ./gradlew

    - name: Build Passenger APK
      run: ./gradlew assemblePassengerDebug

    - name: Build Driver APK
      run: ./gradlew assembleDriverDebug

    - name: Upload Passenger APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: passenger-debug-apk
        path: '**/build/outputs/apk/passenger/debug/app-passenger-debug.apk'

    - name: Upload Driver APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: driver-debug-apk
        path: '**/build/outputs/apk/driver/debug/app-driver-debug.apk'

    - name: Upload Driver APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: driver-debug-apk
        path: app/build/outputs/apk/driver/debug/app-driver-debug.apk
        
